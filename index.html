<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #667eea;
            color: white;
        }

        .actions button {
            width: auto;
            padding: 5px 10px;
            margin: 2px;
            font-size: 12px;
        }

        .delete {
            background: #e53e3e;
        }

        .edit {
            background: #38a169;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Cadastro de Alunos</h2>

        <input type="text" id="nome" placeholder="Nome do aluno">
        <input type="number" id="idade" placeholder="Idade">
        <input type="text" id="curso" placeholder="Curso">

        <button id="btnCadastrar" onclick="cadastrarAlunos()">Cadastrar</button>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Curso</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <!-- JS vai preencher aqui -->
            </tbody>
        </table>

    </div>
    <script src="js/index.js"></script>
</body>

</html>
